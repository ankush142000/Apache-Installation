name: Basic Package Installation

on:
  push:
    paths:
      - inventory/hosts.ini
    branches:
      - main

jobs:
  ansible:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i inventory/hosts.ini ansible/configure_apache.yml
