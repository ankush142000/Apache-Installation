---
- name: Configure Apache Web Server
  hosts: all
  become: yes

  tasks:
    - name: Install Apache
      yum:
        name: httpd
        state: present

    - name: Ensure Apache service is running
      service:
        name: httpd
        state: started
        enabled: yes

    - name: Deploy custom index.html
      copy:
        dest: /var/www/html/index.html
        content: |
          <html>
          <head><title>Welcome</title></head>
          <body>
            <h1>Testing our Apache Server!</h1>
          </body>
          </html>
        owner: root
        group: root
        mode: '0644'
